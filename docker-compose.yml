services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    driver: local

# Usage:
# DB settings are read by Spring from environment variables DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
# Example: docker compose up -d
# Then run the Spring Boot app (mvn spring-boot:run) or build a Docker image for the app and run it.
